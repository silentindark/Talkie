#!KAMAILIO
#
# Talkie - Kamailio SIP Edge Proxy Configuration
# Handles: TLS termination, authentication, rate limiting, load balancing to FreeSWITCH
#

#!define WITH_DEBUG
#!define WITH_TLS
#!define FREESWITCH_IP "freeswitch"
#!define FREESWITCH_PORT "5080"

####### Global Parameters #########
debug=2
log_stderror=no
memdbg=5
memlog=5
log_facility=LOG_LOCAL0
fork=yes
children=4
auto_aliases=no
listen=udp:0.0.0.0:5060
listen=tcp:0.0.0.0:5060
#!ifdef WITH_TLS
listen=tls:0.0.0.0:5061
#!endif

tcp_connection_lifetime=3605
tcp_max_connections=2048

####### Modules Section ########

loadmodule "jsonrpcs.so"
loadmodule "kex.so"
loadmodule "corex.so"
loadmodule "tm.so"
loadmodule "tmx.so"
loadmodule "sl.so"
loadmodule "rr.so"
loadmodule "pv.so"
loadmodule "maxfwd.so"
loadmodule "textops.so"
loadmodule "siputils.so"
loadmodule "xlog.so"
loadmodule "sanity.so"
loadmodule "pike.so"
loadmodule "htable.so"
loadmodule "dispatcher.so"
#!ifdef WITH_TLS
loadmodule "tls.so"
#!endif

# ----- tm params -----
modparam("tm", "failure_reply_mode", 3)
modparam("tm", "fr_timer", 30000)
modparam("tm", "fr_inv_timer", 120000)

# ----- rr params -----
modparam("rr", "enable_full_lr", 0)
modparam("rr", "append_fromtag", 0)

# ----- pike (flood protection) -----
modparam("pike", "sampling_time_unit", 2)
modparam("pike", "reqs_density_per_unit", 30)
modparam("pike", "remove_latency", 4)

# ----- dispatcher (load balancing to FreeSWITCH) -----
modparam("dispatcher", "list_file", "/etc/kamailio/dispatcher.list")
modparam("dispatcher", "flags", 2)
modparam("dispatcher", "dst_avp", "$avp(dsdst)")
modparam("dispatcher", "grp_avp", "$avp(dsgrp)")
modparam("dispatcher", "cnt_avp", "$avp(dscnt)")
modparam("dispatcher", "ds_ping_interval", 30)
modparam("dispatcher", "ds_probing_mode", 1)
modparam("dispatcher", "ds_ping_reply_codes", "class=2")

#!ifdef WITH_TLS
modparam("tls", "config", "/etc/kamailio/tls.cfg")
#!endif

# ----- jsonrpcs params -----
modparam("jsonrpcs", "transport", 7)

####### Routing Logic ########

request_route {
    # Per-request initial checks
    if (!mf_process_maxfwd_header("10")) {
        sl_send_reply("483", "Too Many Hops");
        exit;
    }

    if (!sanity_check("17895", "7")) {
        xlog("L_WARN", "Malformed SIP message from $si:$sp\n");
        exit;
    }

    # Flood protection
    if (!pike_check_req()) {
        xlog("L_ALERT", "PIKE: Blocking $rm from $si\n");
        sl_send_reply("503", "Service Unavailable");
        exit;
    }

    # CANCEL processing
    if (is_method("CANCEL")) {
        if (t_check_trans()) {
            route(RELAY);
        }
        exit;
    }

    # Handle retransmissions
    if (!is_method("ACK")) {
        if (t_precheck_trans()) {
            t_check_trans();
            exit;
        }
        t_check_trans();
    }

    # Record routing for dialog-forming requests
    if (is_method("INVITE|SUBSCRIBE")) {
        record_route();
    }

    # Handle requests within existing dialogs
    if (has_totag()) {
        if (loose_route()) {
            if (is_method("BYE")) {
                # Route BYE through for accounting
            }
            route(RELAY);
            exit;
        }
    }

    # Handle REGISTER - reject (we don't act as registrar)
    if (is_method("REGISTER")) {
        sl_send_reply("403", "Forbidden");
        exit;
    }

    # Handle OPTIONS for keepalive
    if (is_method("OPTIONS")) {
        sl_send_reply("200", "OK");
        exit;
    }

    # Route INVITE to FreeSWITCH pool
    if (is_method("INVITE")) {
        route(DISPATCH);
        exit;
    }

    # Default: relay
    route(RELAY);
}

# Dispatch to FreeSWITCH via dispatcher
route[DISPATCH] {
    # Set 1 = FreeSWITCH pool
    if (!ds_select_dst("1", "4")) {
        # No available destinations
        sl_send_reply("503", "Service Unavailable");
        exit;
    }

    xlog("L_INFO", "Dispatching $rm to $du\n");
    route(RELAY);
}

# Relay route
route[RELAY] {
    if (is_method("INVITE|BYE|SUBSCRIBE|UPDATE")) {
        if (!t_is_set("branch_route")) {
            t_on_branch("MANAGE_BRANCH");
        }
    }

    if (is_method("INVITE|SUBSCRIBE|UPDATE")) {
        if (!t_is_set("onreply_route")) {
            t_on_reply("MANAGE_REPLY");
        }
    }

    if (is_method("INVITE")) {
        t_on_failure("MANAGE_FAILURE");
    }

    if (!t_relay()) {
        sl_reply_error();
    }
    exit;
}

branch_route[MANAGE_BRANCH] {
    xlog("L_DBG", "New branch [$T_branch_idx] to $ru\n");
}

onreply_route[MANAGE_REPLY] {
    xlog("L_DBG", "Reply: $rs $rr\n");
}

failure_route[MANAGE_FAILURE] {
    if (t_is_canceled()) exit;

    # Try next FreeSWITCH if available
    if (t_check_status("5[0-9][0-9]")) {
        if (ds_next_dst()) {
            xlog("L_INFO", "Failover to next FS: $du\n");
            t_on_failure("MANAGE_FAILURE");
            route(RELAY);
            exit;
        }
    }
}
